body{

.card{

.address{

.btn{

text-align:center;
text-decoration:none;
padding:16px;
border-radius:14px;
font-size:20px;
font-weight:bold;
color:white;
margin-bottom:14px;

}

.btn:hover{
transform:scale(1.03);
}

.call{background:#2E7D32;}
.whatsapp{background:#25D366;}
.telegram{background:#229ED9;}

}

}
</script>
